<!DOCTYPE html>
<html>
<head>
<title>Moving Car</title>

<style>
#road{
    width:100%;
    height:200px;
    background-color: lightgray;
    position: relative;
    overflow: hidden;
}
#car{
    width:200px;
    height:60px;
    background-color: red;
    position:absolute;
    top:80px;
    left:0px;
    border-radius: 10px;
    animation: moveCar 5s linear infinite;
}
#up{
    width:120px;
    height:40px;
    background-color: rgb(245, 207, 105);
    position:absolute;
    top:-30px;
    left:40px;
    border-radius: 10px;
}
#wheel1{
    width:40px;
    height:40px;
    background-color:black;
    position:absolute;
    top:40px;
    left:20px;
    border-radius:50%;
    animation: rotateWheel 1s linear infinite;
}
#wheel2{
    width:40px;
    height:40px;
    background-color:black;
    position:absolute;
    top:40px;
    right:20px;
    border-radius:50%;
    animation: rotateWheel 1s linear infinite;
}
@keyframes moveCar{
    from{ transform: translate(0px,0px); }
    to{ transform: translate(800px,0px); }
}
@keyframes rotateWheel{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(360deg); }
}
</style>
</head>
<body>
<h2 align="center">Moving Car Animation</h2>
<div id="road">
    <div id="car">
        <div id="up"></div>
        <div id="wheel1"></div>
        <div id="wheel2"></div>
    </div>
</div>
</body>
</html>
